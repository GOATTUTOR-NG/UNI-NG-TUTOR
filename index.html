<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatTutor NG v6 🐐</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#1e293b;
position:sticky;
top:0;
z-index:10;
}

.menuBtn{
font-size:24px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-270px;
width:260px;
height:100%;
background:#0f172a;
padding:15px;
transition:0.3s;
border-right:1px solid #334155;
z-index:100;
}

.sidebar.open{left:0;}

.sidebar button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
text-align:left;
cursor:pointer;
}

/* MAIN */
.container{
padding:12px;
}

.card{
background:#1e293b;
padding:12px;
border-radius:12px;
margin-top:10px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.small{
font-size:12px;
color:#94a3b8;
}

.row{
display:flex;
gap:6px;
margin-top:8px;
}

.row input,.row select{
flex:1;
}

/* TIMER */
.timer{
font-size:40px;
text-align:center;
margin:10px 0;
}

/* RESPONSIVE FIX */
.page{
display:block;
}

/* MOBILE IMPROVEMENT */
@media(max-width:600px){
.timer{font-size:32px;}
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
<div>🐐 GoatTutor NG</div>
<div class="menuBtn" onclick="toggleMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h3>Menu</h3>
<button onclick="openSide('planner')">📅 Planner</button>
<button onclick="openSide('analyzer')">📊 Analyzer</button>
<button onclick="toggleMenu()">Close</button>
</div>

<div class="container">

<!-- AI (CORE) -->
<div class="card">
<h3>🧠 AI Study Interface</h3>

<textarea id="topic" placeholder="Enter topic..."></textarea>

<select id="mode">
<option value="tutorial">Tutorial</option>
<option value="summary">Summary</option>
<option value="mcq">MCQ</option>
<option value="revision">Revision</option>
</select>

<button onclick="askAI()">Ask AI</button>
</div>

<!-- DASHBOARD 2.0 -->
<div class="card">
<h3>📊 Academic Dashboard</h3>

<div id="dash">
Loading...
</div>

<div class="small" style="margin-top:10px;">
🔥 Study Streak:
<span id="streakDisplay">0</span> Days
</div>

<div class="small">
⏱ Study Hours:
<span id="hoursDisplay">0</span> hrs
</div>
</div>

<!-- GPA -->
<div class="card">
<h3>📚 GPA Calculator</h3>

<div id="gpaBox">
<div class="row">
<input type="number" id="unit1" placeholder="Unit">
<select id="grade1">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>
</div>
</div>

<button onclick="addGPA()">➕ Add Course</button>
<button onclick="calcGPA()">Calculate GPA</button>

<div id="gpaOut"></div>
</div>

<!-- CGPA -->
<div class="card">
<h3>📈 CGPA Calculator</h3>

<div id="cgpaBox">
<div class="row">
<input type="number" id="cunit1" placeholder="Semester Units">
<input type="number" id="cgpa1" placeholder="Semester GPA">
</div>
</div>

<button onclick="addCGPA()">➕ Add Semester</button>
<button onclick="calcCGPA()">Calculate CGPA</button>

<div id="cgpaOut"></div>
</div>

<!-- TIMER -->
<div class="card">
<h3>⏱ Study Tracker</h3>

<div class="timer" id="time">25:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
</div>

<!-- PLANNER (FIXED RESPONSIVE) -->
<div class="card page" id="planner">
<h3>📅 Weekly Planner</h3>

<textarea id="plan" placeholder="Write your weekly study plan..."></textarea>

<button onclick="savePlan()">Save Plan</button>

<div class="small" id="planStatus"></div>
</div>

<!-- ANALYZER (FIXED RESPONSIVE) -->
<div class="card page" id="analyzer">
<h3>📊 Smart Analyzer</h3>

<button onclick="analyze()">Run Analysis</button>

<div class="card" style="margin-top:10px;" id="analysisBox">
No analysis yet
</div>
</div>

</div>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
}

function openSide(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
toggleMenu();
}

/* AI */
function askAI(){
let t=document.getElementById("topic").value;
let m=document.getElementById("mode").value;
if(!t) return alert("Enter topic");

window.open("https://chatgpt.com/?q="+encodeURIComponent(
`Act as GoatTutor AI. Mode:${m}. Topic:${t}`
));
}

  /* DEGREE CLASSIFICATION */
function getDegreeClass(cgpa){

cgpa=parseFloat(cgpa);

if(cgpa>=4.50) return "🥇 First Class";
if(cgpa>=3.50) return "🥈 Second Class Upper";
if(cgpa>=2.40) return "🥉 Second Class Lower";
if(cgpa>=1.50) return "📘 Third Class";
if(cgpa>=1.00) return "📗 Pass";

return "Not Available";
}

/* STUDY STREAK */
function updateStreak(){

let today=new Date().toDateString();

let lastVisit=localStorage.getItem("lastVisit");
let streak=parseInt(localStorage.getItem("streak"))||0;

if(lastVisit!==today){

let yesterday=new Date();
yesterday.setDate(yesterday.getDate()-1);

if(lastVisit===yesterday.toDateString()){
streak++;
}else{
streak=1;
}

localStorage.setItem("streak",streak);
localStorage.setItem("lastVisit",today);
}

document.getElementById("streakDisplay").innerText=
localStorage.getItem("streak")||1;
}

/* STUDY HOURS */
function updateStudyHours(){

let minutes=parseInt(
localStorage.getItem("studyMinutes")
)||0;

document.getElementById("hoursDisplay").innerText=
(minutes/60).toFixed(1);
}
  
function updateDash(){

let gpa=localStorage.getItem("gpa")||"0";
let cgpa=localStorage.getItem("cgpa")||"0";

let degree=getDegreeClass(cgpa);

document.getElementById("dash").innerHTML=
`
🎓 GPA: ${gpa}<br><br>

📈 CGPA: ${cgpa}<br><br>

🏆 Degree Class: ${degree}<br><br>

${cgpa>=3.5
?"✅ Academic Standing: Good"
:"⚠️ Academic Standing: Needs Improvement"}
`;

updateStreak();
updateStudyHours();
}

/* GPA */
let gpaCount=1;

function addGPA(){
gpaCount++;
let d=document.createElement("div");
d.className="row";
d.innerHTML=`
<input type="number" id="unit${gpaCount}" placeholder="Unit">
<select id="grade${gpaCount}">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>`;
document.getElementById("gpaBox").appendChild(d);
}

function calcGPA(){
let total=0,units=0;

for(let i=1;i<=gpaCount;i++){
let u=parseFloat(document.getElementById("unit"+i).value);
let g=parseFloat(document.getElementById("grade"+i).value);

if(!isNaN(u)&&!isNaN(g)){
total+=u*g;
units+=u;
}
}

if(units===0) return alert("Enter data");

let gpa=(total/units).toFixed(2);
localStorage.setItem("gpa",gpa);
document.getElementById("gpaOut").innerText="GPA: "+gpa;

updateDash();
}

/* CGPA */
let semCount=1;

function addCGPA(){
semCount++;
let d=document.createElement("div");
d.className="row";
d.innerHTML=`
<input type="number" id="cunit${semCount}" placeholder="Units">
<input type="number" id="cgpa${semCount}" placeholder="GPA">
`;
document.getElementById("cgpaBox").appendChild(d);
}

function calcCGPA(){
let total=0,units=0;

for(let i=1;i<=semCount;i++){
let u=parseFloat(document.getElementById("cunit"+i).value);
let g=parseFloat(document.getElementById("cgpa"+i).value);

if(!isNaN(u)&&!isNaN(g)){
total+=u*g;
units+=u;
}
}

if(units===0) return alert("Enter data");

let cgpa=(total/units).toFixed(2);
localStorage.setItem("cgpa",cgpa);
document.getElementById("cgpaOut").innerText="CGPA: "+cgpa;

updateDash();
}

/* PLANNER */
function savePlan(){
localStorage.setItem("plan",document.getElementById("plan").value);
document.getElementById("planStatus").innerText="Saved ✔";
}

/* ANALYZER */
function analyze(){
let g=parseFloat(localStorage.getItem("gpa")||0);

let msg="";
if(g>=4.5) msg="🔥 Excellent Performance";
else if(g>=3.5) msg="👍 Good Performance";
else if(g>=2.4) msg="⚠️ Average Performance";
else msg="📌 Low Performance";

document.getElementById("analysisBox").innerText=msg;
}

/* TIMER */
let t=1500,run;

function updateTime(){
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("time").innerText=
`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function startTimer(){
if(run) return;
run=setInterval(()=>{t--;updateTime();if(t<=0)clearInterval(run);},1000);
}

function pauseTimer(){clearInterval(run);run=null;}
function resetTimer(){clearInterval(run);run=null;t=1500;updateTime();}

updateTime();
updateDash();

</script>

</body>
  </html>
