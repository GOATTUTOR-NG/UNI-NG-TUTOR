<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatTutor NG v5 🐐</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}

body{
background:#0f172a;
color:white;
padding:10px;
}

/* TOP NAV */
.nav{
display:flex;
gap:6px;
overflow-x:auto;
background:#1e293b;
padding:10px;
border-radius:12px;
position:sticky;
top:0;
}

.nav button{
flex:1;
min-width:120px;
padding:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
cursor:pointer;
}

.nav button.active{
background:#2563eb;
}

/* PAGES */
.page{
display:none;
margin-top:12px;
}

.page.active{
display:block;
}

/* CARDS */
.card{
background:#1e293b;
padding:12px;
border-radius:12px;
margin-top:10px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.small{
font-size:12px;
color:#94a3b8;
}

/* TIMER */
.timer{
font-size:40px;
text-align:center;
margin:10px 0;
}

.row{display:flex;gap:6px;margin-top:6px;}
.row input,.row select{flex:1;}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="openPage('dashboard',this)" class="active">Dashboard</button>
<button onclick="openPage('gpa',this)">GPA</button>
<button onclick="openPage('cgpa',this)">CGPA</button>
<button onclick="openPage('timer',this)">Timer</button>
<button onclick="openPage('planner',this)">Planner</button>
<button onclick="openPage('analyzer',this)">Analyzer</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<div class="card">
<h3>📊 Academic Dashboard</h3>
<div id="dashData">No data yet</div>
</div>
</div>

<!-- GPA -->
<div id="gpa" class="page">
<div class="card">
<h3>📚 GPA Calculator</h3>

<div class="row">
<input id="unit1" type="number" placeholder="Course Unit">
<select id="grade1">
<option disabled selected>Grade</option>
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>
</div>

<button onclick="calcGPA()">Calculate GPA</button>
<div id="gpaResult"></div>
</div>
</div>

<!-- CGPA -->
<div id="cgpa" class="page">
<div class="card">
<h3>📈 CGPA Calculator</h3>

<div class="row">
<input id="cunit1" placeholder="Units">
<input id="cgpa1" placeholder="GPA">
</div>

<button onclick="calcCGPA()">Calculate CGPA</button>
<div id="cgpaResult"></div>
</div>
</div>

<!-- TIMER -->
<div id="timer" class="page">
<div class="card">
<h3>⏱ Focus Timer</h3>

<div class="timer" id="time">25:00</div>
<div class="small" id="status">Ready</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
</div>
</div>

<!-- PLANNER -->
<div id="planner" class="page">
<div class="card">
<h3>📅 Weekly Planner</h3>

<textarea id="plan" placeholder="Write your weekly study plan..."></textarea>
<button onclick="savePlan()">Save Plan</button>

<div class="small" id="planOut"></div>
</div>
</div>

<!-- ANALYZER -->
<div id="analyzer" class="page">
<div class="card">
<h3>📊 Smart GPA Analyzer</h3>

<div id="analysis"></div>
<button onclick="analyze()">Analyze Performance</button>
</div>
</div>

<script>

/* NAV SYSTEM */
function openPage(id,btn){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));

document.getElementById(id).classList.add('active');
btn.classList.add('active');
}

/* GPA */
function calcGPA(){
let u=parseFloat(document.getElementById("unit1").value);
let g=parseFloat(document.getElementById("grade1").value);

if(!u||isNaN(g)) return alert("Fill data");

let gpa=(u*g/u).toFixed(2); // simple demo single course

document.getElementById("gpaResult").innerHTML="GPA: "+gpa;
localStorage.setItem("last_gpa",gpa);
updateDash();
}

/* CGPA */
function calcCGPA(){
let u=parseFloat(document.getElementById("cunit1").value);
let g=parseFloat(document.getElementById("cgpa1").value);

if(!u||!g) return alert("Fill data");

let cgpa=g.toFixed(2);
document.getElementById("cgpaResult").innerHTML="CGPA: "+cgpa;
localStorage.setItem("last_cgpa",cgpa);
updateDash();
}

/* DASHBOARD */
function updateDash(){
let gpa=localStorage.getItem("last_gpa")||"0";
let cgpa=localStorage.getItem("last_cgpa")||"0";

document.getElementById("dashData").innerHTML=`
Current GPA: ${gpa}<br>
Current CGPA: ${cgpa}<br>
Status: ${cgpa>=3.5?"Good 👍":"Needs Improvement ⚠️"}
`;
}

/* PLANNER */
function savePlan(){
let p=document.getElementById("plan").value;
localStorage.setItem("plan",p);
document.getElementById("planOut").innerText="Saved ✔";
}
window.onload=function(){
document.getElementById("plan").value=localStorage.getItem("plan")||"";
updateDash();
}

/* ANALYZER */
function analyze(){
let g=parseFloat(localStorage.getItem("last_gpa")||0);
let msg="";

if(g>=4.5) msg="Excellent performance 🔥";
else if(g>=3.5) msg="Good, keep improving 👍";
else if(g>=2.4) msg="Average, increase effort ⚠️";
else msg="Low performance, need serious study 📌";

document.getElementById("analysis").innerHTML=msg;
}

/* TIMER */
let t=1500;
let run;

function updateTime(){
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("time").innerText=
`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function startTimer(){
if(run) return;
run=setInterval(()=>{
t--;
updateTime();
if(t<=0){
clearInterval(run);
document.getElementById("status").innerText="Session done ✔";
}
},1000);
}

function pauseTimer(){
clearInterval(run);
run=null;
}

function resetTimer(){
clearInterval(run);
run=null;
t=1500;
updateTime();
document.getElementById("status").innerText="Ready";
}

updateTime();

</script>

</body>
                                                 </html>
