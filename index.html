<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatTutor NG v4 🐐</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
padding:12px;
}

/* LOGIN */
#login{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.loginBox{
background:#1e293b;
padding:20px;
border-radius:14px;
width:90%;
max-width:320px;
text-align:center;
}

.loginBox input{
width:100%;
margin-top:10px;
padding:12px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

.loginBox button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

/* MAIN */
.card{
background:#1e293b;
padding:15px;
border-radius:15px;
max-width:900px;
margin:auto;
}

h2,h3{text-align:center;}

textarea{
width:100%;
height:150px;
margin-top:10px;
padding:12px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

/* QUICK */
.quick{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.quick div{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

/* MODES */
.options{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:10px;
}

.option{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.selected{
background:#2563eb;
}

/* BUTTONS */
button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

/* GPA TABLE */
.row{
display:flex;
gap:8px;
margin-top:8px;
}

input,select{
flex:1;
padding:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

/* FOOTER */
footer{
margin-top:15px;
text-align:center;
font-size:12px;
color:#94a3b8;
}

.logoutBtn{
margin-top:10px;
background:#ef4444;
}

/* MOBILE */
@media(max-width:600px){
.quick{grid-template-columns:repeat(2,1fr);}
.options{grid-template-columns:1fr;}
.row{flex-direction:column;}
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
<div class="loginBox">
<h3>🐐 GoatTutor Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div class="card">

<h2>🐐 GoatTutor NG v4</h2>

<textarea id="topic" placeholder="Enter topic..."></textarea>

<div class="quick">
<div onclick="fill('PHY 101')">PHY 101</div>
<div onclick="fill('CHM 102')">CHM 102</div>
<div onclick="fill('MTH 101')">MTH 101</div>
<div onclick="fill('GST 101')">GST 101</div>
<div onclick="fill('BIO 101')">BIO 101</div>
<div onclick="fill('COS 101')">COS 101</div>
</div>

<div class="options">
<div class="option selected" onclick="setMode('tutorial',this)">Tutorial</div>
<div class="option" onclick="setMode('summary',this)">Summary</div>
<div class="option" onclick="setMode('mcq',this)">MCQ</div>
<div class="option" onclick="setMode('revision',this)">Revision</div>
</div>

<button onclick="teach()">🚀 Teach Me</button>

<hr style="margin:15px 0;border:1px solid #334155">

<h3>📊 GPA Calculator (Per Semester)</h3>

<div id="gpaBox">
<div class="row">
<input type="number" id="unit1" placeholder="Unit">
<select id="grade1">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>
</div>
</div>

<button onclick="addGPA()">➕ Add Course</button>
<button onclick="calcGPA()">📊 Calculate GPA</button>

<div id="gpaResult"></div>

<hr style="margin:15px 0;border:1px solid #334155">

<h3>📈 CGPA Calculator (Cumulative)</h3>

<div id="cgpaBox">
<div class="row">
<input type="number" id="cunit1" placeholder="Semester Units">
<input type="number" id="cgpa1" placeholder="Semester GPA">
</div>
</div>

<button onclick="addCGPA()">➕ Add Semester</button>
<button onclick="calcCGPA()">📊 Calculate CGPA</button>

<div id="cgpaResult"></div>

<footer>
<button class="logoutBtn" onclick="logout()">Logout</button>
<p>Made for Nigerian Students 🇳🇬</p>
</footer>

</div>

<script>

/* LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(!u||!p) return alert("Fill login");

localStorage.setItem("gt_user",u);
document.getElementById("login").style.display="none";
}

function logout(){
localStorage.removeItem("gt_user");
location.reload();
}

window.onload=function(){
if(localStorage.getItem("gt_user")){
document.getElementById("login").style.display="none";
}
}

/* AI */
let mode="tutorial";

function fill(t){
document.getElementById("topic").value=t;
}

function setMode(m,el){
mode=m;
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
}

function teach(){
let t=document.getElementById("topic").value.trim();
if(!t) return alert("Enter topic");

let prompt=`Act as GoatTutor AI. Mode:${mode}. Topic:${t}`;

window.open("https://chatgpt.com/?q="+encodeURIComponent(prompt),"_blank");
}

/* GPA */
let gpaCount=1;

function addGPA(){
gpaCount++;
let d=document.createElement("div");
d.className="row";
d.innerHTML=`
<input type="number" id="unit${gpaCount}" placeholder="Unit">
<select id="grade${gpaCount}">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>`;
document.getElementById("gpaBox").appendChild(d);
}

function calcGPA(){
let total=0,units=0;

for(let i=1;i<=gpaCount;i++){
let u=parseFloat(document.getElementById("unit"+i).value);
let g=parseFloat(document.getElementById("grade"+i).value);
if(!isNaN(u)){total+=u*g;units+=u;}
}

if(units===0) return alert("Enter data");

let gpa=(total/units).toFixed(2);
document.getElementById("gpaResult").innerHTML="🎓 GPA: "+gpa+"/5.0";
}

/* CGPA */
let semCount=1;

function addCGPA(){
semCount++;
let d=document.createElement("div");
d.className="row";
d.innerHTML=`
<input type="number" id="cunit${semCount}" placeholder="Semester Units">
<input type="number" id="cgpa${semCount}" placeholder="Semester GPA">
`;
document.getElementById("cgpaBox").appendChild(d);
}

function calcCGPA(){
let totalPoints=0,totalUnits=0;

for(let i=1;i<=semCount;i++){
let u=parseFloat(document.getElementById("cunit"+i).value);
let g=parseFloat(document.getElementById("cgpa"+i).value);

if(!isNaN(u)&&!isNaN(g)){
totalPoints+=u*g;
totalUnits+=u;
}
}

if(totalUnits===0) return alert("Enter data");

let cgpa=(totalPoints/totalUnits).toFixed(2);
document.getElementById("cgpaResult").innerHTML="📈 CGPA: "+cgpa+"/5.0";
}

</script>

</body>
</html>
