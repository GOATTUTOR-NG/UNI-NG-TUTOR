<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatTutor NG v5.1 🐐</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}

body{
background:#0f172a;
color:white;
padding:10px;
}

/* NAV */
.nav{
display:flex;
gap:6px;
overflow-x:auto;
background:#1e293b;
padding:10px;
border-radius:12px;
position:sticky;
top:0;
}

.nav button{
min-width:120px;
padding:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
cursor:pointer;
}

.nav button.active{background:#2563eb;}

/* PAGE */
.page{display:none;margin-top:12px;}
.page.active{display:block;}

.card{
background:#1e293b;
padding:12px;
border-radius:12px;
margin-top:10px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.small{font-size:12px;color:#94a3b8;}

.row{display:flex;gap:6px;margin-top:6px;}
.row input,.row select{flex:1;}

/* AI BOX */
.aiBox{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button class="active" onclick="openPage('dashboard',this)">Dashboard</button>
<button onclick="openPage('gpa',this)">GPA</button>
<button onclick="openPage('cgpa',this)">CGPA</button>
<button onclick="openPage('timer',this)">Timer</button>
<button onclick="openPage('planner',this)">Planner</button>
<button onclick="openPage('analyzer',this)">Analyzer</button>
<button onclick="openPage('ai',this)">AI Study</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<div class="card">
<h3>📊 Dashboard</h3>
<div id="dash">No data yet</div>
</div>
</div>

<!-- GPA -->
<div id="gpa" class="page">
<div class="card">
<h3>📚 GPA</h3>

<div class="row">
<input id="unit1" type="number" placeholder="Unit">
<select id="grade1">
<option disabled selected>Grade</option>
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>
</div>

<button onclick="calcGPA()">Calculate GPA</button>
<div id="gpaOut"></div>
</div>
</div>

<!-- CGPA -->
<div id="cgpa" class="page">
<div class="card">
<h3>📈 CGPA</h3>

<div class="row">
<input id="cunit1" placeholder="Units">
<input id="cgpa1" placeholder="GPA">
</div>

<button onclick="calcCGPA()">Calculate CGPA</button>
<div id="cgpaOut"></div>
</div>
</div>

<!-- TIMER -->
<div id="timer" class="page">
<div class="card">
<h3>⏱ Timer</h3>
<div id="time" style="font-size:40px;text-align:center;">25:00</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
</div>
</div>

<!-- PLANNER -->
<div id="planner" class="page">
<div class="card">
<h3>📅 Planner</h3>
<textarea id="plan"></textarea>
<button onclick="savePlan()">Save</button>
<div class="small" id="planMsg"></div>
</div>
</div>

<!-- ANALYZER -->
<div id="analyzer" class="page">
<div class="card">
<h3>📊 Analyzer</h3>
<div id="analysis"></div>
<button onclick="analyze()">Run Analysis</button>
</div>
</div>

<!-- AI STUDY (RESTORED 🔥) -->
<div id="ai" class="page">
<div class="card">
<h3>🧠 AI Study Interface</h3>

<input id="topic" placeholder="Enter topic e.g. Newton Laws">

<div class="aiBox">
<div class="small">Mode</div>
<select id="mode">
<option value="tutorial">Tutorial</option>
<option value="summary">Summary</option>
<option value="mcq">MCQ</option>
<option value="revision">Revision</option>
</select>

<button onclick="askAI()">Ask AI</button>
</div>

<div class="small">Opens ChatGPT with structured prompt</div>
</div>
</div>

<script>

/* NAV */
function openPage(id,btn){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));

document.getElementById(id).classList.add('active');
btn.classList.add('active');
}

/* GPA */
function calcGPA(){
let u=parseFloat(document.getElementById("unit1").value);
let g=parseFloat(document.getElementById("grade1").value);
if(!u||isNaN(g)) return alert("Fill data");

let gpa=(u*g/u).toFixed(2);
document.getElementById("gpaOut").innerText="GPA: "+gpa;
localStorage.setItem("gpa",gpa);
updateDash();
}

/* CGPA */
function calcCGPA(){
let u=parseFloat(document.getElementById("cunit1").value);
let g=parseFloat(document.getElementById("cgpa1").value);
if(!u||!g) return alert("Fill data");

let cgpa=g.toFixed(2);
document.getElementById("cgpaOut").innerText="CGPA: "+cgpa;
localStorage.setItem("cgpa",cgpa);
updateDash();
}

/* DASH */
function updateDash(){
let gpa=localStorage.getItem("gpa")||"0";
let cgpa=localStorage.getItem("cgpa")||"0";

document.getElementById("dash").innerHTML=
`GPA: ${gpa}<br>CGPA: ${cgpa}<br>Status: ${cgpa>=3.5?"Good 👍":"Needs Improvement ⚠️"}`;
}

/* PLANNER */
function savePlan(){
localStorage.setItem("plan",document.getElementById("plan").value);
document.getElementById("planMsg").innerText="Saved ✔";
}

/* ANALYZER */
function analyze(){
let g=parseFloat(localStorage.getItem("gpa")||0);

let msg="";
if(g>=4.5) msg="Excellent 🔥";
else if(g>=3.5) msg="Good 👍";
else if(g>=2.4) msg="Average ⚠️";
else msg="Low performance 📌";

document.getElementById("analysis").innerText=msg;
}

/* TIMER */
let t=1500,run;

function update(){
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("time").innerText=
`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function start(){
if(run) return;
run=setInterval(()=>{t--;update();if(t<=0)clearInterval(run);},1000);
}
function pause(){clearInterval(run);run=null;}
function reset(){clearInterval(run);run=null;t=1500;update();}

/* AI RESTORED */
function askAI(){
let topic=document.getElementById("topic").value;
let mode=document.getElementById("mode").value;

if(!topic) return alert("Enter topic");

let prompt=`Act as GoatTutor AI. Mode:${mode}. Topic:${topic}`;

window.open("https://chatgpt.com/?q="+encodeURIComponent(prompt));
}

update();
updateDash();

</script>

</body>
</html>
