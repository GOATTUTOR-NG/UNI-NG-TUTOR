<!DOCTYPE html>
<html lang="en">
<head>
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xb50ly2ja2");
  </script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatTutor NG v4 🐐</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}

body{
background:#0f172a;
color:white;
min-height:100vh;
padding:12px;
}

#login{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.loginBox{
background:#1e293b;
padding:20px;
border-radius:14px;
width:90%;
max-width:320px;
text-align:center;
}

.loginBox input{
width:100%;
margin-top:10px;
padding:12px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

.loginBox button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
max-width:900px;
margin:auto;
}

h2,h3{text-align:center;}

textarea{
width:100%;
height:150px;
margin-top:10px;
padding:12px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

.quick{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.quick div{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.options{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:10px;
}

.option{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.selected{background:#2563eb;}

button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

.row{
display:flex;
gap:8px;
margin-top:8px;
}

input,select{
flex:1;
padding:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

footer{
text-align:center;
font-size:12px;
color:#94a3b8;
margin-top:15px;
}

.logoutBtn{background:#ef4444;margin-top:10px;}

.historyBox{
background:#0f172a;
padding:10px;
margin-top:10px;
border-radius:10px;
font-size:13px;
color:#cbd5e1;
max-height:120px;
overflow:auto;
}

.dashboardBox{
background:#0f172a;
padding:10px;
margin-top:10px;
border-radius:10px;
font-size:13px;
color:#cbd5e1;
}

canvas{
width:100%;
max-height:180px;
background:#0f172a;
border-radius:10px;
margin-top:10px;
}

@media(max-width:600px){
.quick{grid-template-columns:repeat(2,1fr);}
.options{grid-template-columns:1fr;}
.row{flex-direction:column;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="loginBox">
<h3>🐐 GoatTutor Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div class="card">

<h2>🐐 GoatTutor NG v4</h2>

<textarea id="topic" placeholder="Enter topic..."></textarea>

<div class="quick">
<div onclick="fill('PHY 101')">PHY 101</div>
<div onclick="fill('CHM 102')">CHM 102</div>
<div onclick="fill('MTH 101')">MTH 101</div>
<div onclick="fill('GST 101')">GST 101</div>
<div onclick="fill('BIO 101')">BIO 101</div>
<div onclick="fill('COS 101')">COS 101</div>
</div>

<div class="options">
<div class="option selected" onclick="setMode('tutorial',this)">Tutorial</div>
<div class="option" onclick="setMode('summary',this)">Summary</div>
<div class="option" onclick="setMode('mcq',this)">MCQ</div>
<div class="option" onclick="setMode('revision',this)">Revision</div>
</div>

<button onclick="teach()">🚀 Teach Me</button>

<hr>

<h3>📊 GPA Calculator</h3>

<div id="gpaBox">
<div class="row">
<input type="number" id="unit1">
<select id="grade1">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>
</div>
</div>

<button onclick="addGPA()">➕ Add Course</button>
<button onclick="calcGPA()">📊 Calculate GPA</button>

<div id="gpaResult"></div>

<hr>

<h3>📈 CGPA Calculator</h3>

<div id="cgpaBox">
<div class="row">
<input type="number" id="cunit1">
<input type="number" id="cgpa1">
</div>
</div>

<button onclick="addCGPA()">➕ Add Semester</button>
<button onclick="calcCGPA()">📊 Calculate CGPA</button>

<div id="cgpaResult"></div>

<hr>

<h3>📊 Academic Dashboard</h3>

<div class="dashboardBox" id="dashboardBox">
📉 No data yet. Start calculating GPA.
</div>

<canvas id="chart"></canvas>

<hr>

<h3>📚 History</h3>

<div class="historyBox" id="history"></div>

<button onclick="clearHistory()" style="background:#f97316;">🗑 Clear History</button>

<footer>
<button class="logoutBtn" onclick="logout()">Logout</button>
<p>Made for Nigerian Students 🇳🇬</p>
</footer>

</div>

<script>

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;
if(!u||!p) return alert("Fill login");
localStorage.setItem("gt_user",u);
document.getElementById("login").style.display="none";
}

function logout(){
localStorage.removeItem("gt_user");
location.reload();
}

window.onload=function(){
if(localStorage.getItem("gt_user")){
document.getElementById("login").style.display="none";
}
loadHistory();
updateDashboard();
drawChart();
}

/* AI */
let mode="tutorial";
function fill(t){document.getElementById("topic").value=t;}

function setMode(m,el){
mode=m;
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
}

function teach(){
let t=document.getElementById("topic").value.trim();
if(!t) return alert("Enter topic");
let prompt=`Act as GoatTutor AI. Mode:${mode}. Topic:${t}`;
window.open("https://chatgpt.com/?q="+encodeURIComponent(prompt),"_blank");
}

/* GPA */
let gpaCount=1;
let gpaRecords=JSON.parse(localStorage.getItem("gpa_records")||"[]");

function addGPA(){
gpaCount++;
let d=document.createElement("div");
d.className="row";
d.innerHTML=`
<input type="number" id="unit${gpaCount}">
<select id="grade${gpaCount}">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>`;
document.getElementById("gpaBox").appendChild(d);
}

function calcGPA(){
let total=0,units=0;

for(let i=1;i<=gpaCount;i++){
let u=parseFloat(document.getElementById("unit"+i).value);
let g=parseFloat(document.getElementById("grade"+i).value);
if(!isNaN(u)){total+=u*g;units+=u;}
}

if(units===0) return alert("Enter data");

let gpa=(total/units).toFixed(2);

document.getElementById("gpaResult").innerHTML="🎓 GPA: "+gpa+"/5.0";

saveData("GPA",gpa);
}

/* CGPA */
let semCount=1;

function addCGPA(){
semCount++;
let d=document.createElement("div");
d.className="row";
d.innerHTML=`
<input type="number" id="cunit${semCount}">
<input type="number" id="cgpa${semCount}">
`;
document.getElementById("cgpaBox").appendChild(d);
}

function calcCGPA(){
let total=0,units=0;

for(let i=1;i<=semCount;i++){
let u=parseFloat(document.getElementById("cunit"+i).value);
let g=parseFloat(document.getElementById("cgpa"+i).value);
if(!isNaN(u)&&!isNaN(g)){
total+=u*g;
units+=u;
}
}

if(units===0) return alert("Enter data");

let cgpa=(total/units).toFixed(2);

let cls="";
if(cgpa>=4.50) cls="First Class";
else if(cgpa>=3.50) cls="2:1";
else if(cgpa>=2.40) cls="2:2";
else if(cgpa>=1.50) cls="Third Class";
else cls="Fail";

document.getElementById("cgpaResult").innerHTML=
`📈 CGPA: ${cgpa}/5.0<br>${cls}`;
}

/* HISTORY + DASHBOARD */
function saveData(type,val){

let history=JSON.parse(localStorage.getItem("gt_history")||"[]");
history.unshift({type,val,date:new Date().toLocaleString()});
localStorage.setItem("gt_history",JSON.stringify(history));

if(type==="GPA"){
gpaRecords.unshift(parseFloat(val));
localStorage.setItem("gpa_records",JSON.stringify(gpaRecords));
}

loadHistory();
updateDashboard();
drawChart();
}

function loadHistory(){
let history=JSON.parse(localStorage.getItem("gt_history")||"[]");
document.getElementById("history").innerHTML=
history.map(h=>`[${h.date}] ${h.type}: ${h.val}`).join("<br>");
}

function clearHistory(){
localStorage.removeItem("gt_history");
localStorage.removeItem("gpa_records");
gpaRecords=[];
loadHistory();
updateDashboard();
drawChart();
}

function updateDashboard(){

if(gpaRecords.length===0){
document.getElementById("dashboardBox").innerHTML="📉 No data yet.";
return;
}

let avg=(gpaRecords.reduce((a,b)=>a+b,0)/gpaRecords.length).toFixed(2);
let best=Math.max(...gpaRecords);
let worst=Math.min(...gpaRecords);

document.getElementById("dashboardBox").innerHTML=`
📊 Avg GPA: ${avg}<br>
🏆 Best GPA: ${best}<br>
⚠️ Lowest GPA: ${worst}<br>
📚 Records: ${gpaRecords.length}
`;
}

function drawChart(){

let canvas=document.getElementById("chart");
let ctx=canvas.getContext("2d");

canvas.width=canvas.offsetWidth;
canvas.height=180;

ctx.clearRect(0,0,canvas.width,canvas.height);

if(gpaRecords.length<2) return;

let step=canvas.width/(gpaRecords.length-1);

ctx.beginPath();
ctx.strokeStyle="#3b82f6";
ctx.lineWidth=2;

gpaRecords.forEach((g,i)=>{
let x=i*step;
let y=canvas.height-(g/5*canvas.height);
if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});

ctx.stroke();
}

</script>

</body>
</html>
