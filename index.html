<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatTutor NG v4 Login 🐐</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

/* LOGIN SCREEN */
#loginScreen{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.loginBox{
background:#1e293b;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
}

.loginBox input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
}

.loginBox button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

/* MAIN */
header{
background:#111827;
padding:12px;
text-align:center;
font-weight:bold;
}

.logout{
position:absolute;
right:10px;
top:10px;
background:#ef4444;
padding:6px 10px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size:12px;
}

/* CARD */
.card{
background:#1e293b;
padding:15px;
border-radius:15px;
max-width:900px;
margin:15px auto;
}

/* INPUT */
textarea{
width:100%;
height:160px;
margin-top:10px;
padding:12px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

/* QUICK */
.quick{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.quick div{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

/* MODES */
.options{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:10px;
}

.option{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.selected{
background:#2563eb;
}

/* BUTTON */
button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

/* CGPA */
.row{
display:flex;
gap:8px;
margin-top:8px;
}

input,select{
flex:1;
padding:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

/* MOBILE */
@media(max-width:600px){
.quick{grid-template-columns:repeat(2,1fr);}
.options{grid-template-columns:1fr;}
.row{flex-direction:column;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="loginBox">
<h2>🐐 GoatTutor Login</h2>
<input id="user" placeholder="Enter username">
<input id="pass" type="password" placeholder="Enter password">
<button onclick="login()">Login</button>
<p style="font-size:12px;margin-top:10px;color:#94a3b8;">
Demo: any username/password works
</p>
</div>
</div>

<header>
🐐 GoatTutor NG v4
<button class="logout" onclick="logout()">Logout</button>
</header>

<div class="card">

<h3>AI Study Assistant</h3>

<textarea id="topic" placeholder="Enter topic..."></textarea>

<div class="quick">
<div onclick="fill('PHY 101')">PHY 101</div>
<div onclick="fill('CHM 102')">CHM 102</div>
<div onclick="fill('MTH 101')">MTH 101</div>
<div onclick="fill('GST 101')">GST 101</div>
<div onclick="fill('BIO 101')">BIO 101</div>
<div onclick="fill('COS 101')">COS 101</div>
</div>

<div class="options">
<div class="option selected" onclick="setMode('tutorial',this)">Tutorial</div>
<div class="option" onclick="setMode('summary',this)">Summary</div>
<div class="option" onclick="setMode('mcq',this)">MCQ</div>
<div class="option" onclick="setMode('revision',this)">Revision</div>
</div>

<button onclick="teach()">🚀 Teach Me</button>

<hr style="margin:15px 0;border:1px solid #334155">

<h3>📊 CGPA Calculator</h3>

<div id="cgpaBox">

<div class="row">
<input type="number" id="unit1" placeholder="Unit">
<select id="grade1">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>
</div>

</div>

<button onclick="addCourse()">➕ Add Course</button>
<button onclick="calc()">📊 Calculate CGPA</button>

<div id="result"></div>

</div>

<script>

/* LOGIN SYSTEM */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(!u || !p) return alert("Fill login");

localStorage.setItem("gt_user",u);
document.getElementById("loginScreen").style.display="none";
}

function logout(){
localStorage.removeItem("gt_user");
location.reload();
}

window.onload=function(){
if(localStorage.getItem("gt_user")){
document.getElementById("loginScreen").style.display="none";
}
}

/* CORE */
let mode="tutorial";
let count=1;

function fill(t){
document.getElementById("topic").value=t;
}

function setMode(m,el){
mode=m;
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
}

function teach(){

let topic=document.getElementById("topic").value.trim();
if(!topic) return alert("Enter topic");

let prompt=`Act as GoatTutor AI. Mode:${mode}. Topic:${topic}`;

window.open("https://chatgpt.com/?q="+encodeURIComponent(prompt),"_blank");
}

/* CGPA */
function addCourse(){
count++;

let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<input type="number" id="unit${count}" placeholder="Unit">
<select id="grade${count}">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>
`;

document.getElementById("cgpaBox").appendChild(div);
}

function calc(){
let total=0,unit=0;

for(let i=1;i<=count;i++){
let u=parseFloat(document.getElementById("unit"+i).value);
let g=parseFloat(document.getElementById("grade"+i).value);

if(!isNaN(u)){
total+=u*g;
unit+=u;
}
}

if(unit===0) return alert("Enter values");

let cgpa=(total/unit).toFixed(2);

document.getElementById("result").innerHTML=
"🎓 CGPA: "+cgpa+"/5.0";
}

</script>

</body>
  </html>
