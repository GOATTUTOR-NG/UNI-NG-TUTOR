<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoatTutor NG v5 🐐</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
padding:15px;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:#111827;
border-radius:12px;
margin-bottom:15px;
}

.logo{
font-weight:bold;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:18px;
border-radius:18px;
}

/* TEXTAREA */
textarea{
width:100%;
height:160px;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#0f172a;
color:white;
margin-top:10px;
}

/* QUICK BUTTONS */
.quick{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.quick div{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-size:14px;
}

/* MODES */
.options{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-top:12px;
}

.option{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.selected{
background:#2563eb;
}

/* BUTTONS */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

/* CGPA */
.row{
display:flex;
gap:8px;
margin-top:8px;
}

input,select{
flex:1;
padding:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

#result{
text-align:center;
margin-top:10px;
font-size:1.2rem;
}

/* MOBILE */
@media(max-width:600px){
.quick{grid-template-columns:repeat(2,1fr);}
.options{grid-template-columns:1fr;}
.row{flex-direction:column;}
}
</style>
</head>

<body>

<header>
<div class="logo">🐐 GoatTutor NG v5</div>
</header>

<div class="container">

<div class="card">

<h3>AI Study Assistant</h3>

<textarea id="topic" placeholder="Enter topic..."></textarea>

<div class="quick">
<div onclick="fill('PHY 101')">PHY 101</div>
<div onclick="fill('CHM 102')">CHM 102</div>
<div onclick="fill('MTH 101')">MTH 101</div>
<div onclick="fill('GST 101')">GST 101</div>
<div onclick="fill('BIO 101')">BIO 101</div>
<div onclick="fill('COS 101')">COS 101</div>
</div>

<div class="options">
<div class="option selected" onclick="setMode('tutorial',this)">Tutorial</div>
<div class="option" onclick="setMode('summary',this)">Summary</div>
<div class="option" onclick="setMode('mcq',this)">MCQ</div>
<div class="option" onclick="setMode('revision',this)">Revision</div>
</div>

<button onclick="teach()">🚀 Teach Me</button>
<button onclick="copyPrompt()">📋 Copy Prompt</button>

<hr style="margin:15px 0;border:1px solid #334155">

<h3>📊 CGPA Calculator (5.0)</h3>

<div id="cgpaBox">

<div class="row">
<input type="number" id="unit1" placeholder="Unit">
<select id="grade1">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>
</div>

</div>

<button onclick="addCourse()">➕ Add Course</button>
<button onclick="calcCGPA()">📊 Calculate CGPA</button>

<div id="result"></div>

</div>
</div>

<script>

let mode = "tutorial";
let courseCount = 1;

/* QUICK FILL */
function fill(text){
document.getElementById("topic").value = text;
}

/* MODE */
function setMode(m,el){
mode = m;
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
}

/* TEACH */
function teach(){

let topic = document.getElementById("topic").value.trim();
if(!topic) return alert("Enter topic");

let map = {
tutorial:"Explain in detail with Nigerian analogies and memory tricks.",
summary:"Give short exam-ready notes.",
mcq:"Generate tough MCQs with answers.",
revision:"Give crash revision guide."
};

let prompt = `Act as GoatTutor AI.\nMode: ${mode}\nInstruction: ${map[mode]}\nTopic: ${topic}`;

window.open("https://chatgpt.com/?q="+encodeURIComponent(prompt),"_blank");
}

/* COPY */
function copyPrompt(){
let t = document.getElementById("topic").value;
if(!t) return alert("Enter topic");
navigator.clipboard.writeText(t);
alert("Copied");
}

/* CGPA */
function addCourse(){

courseCount++;

let div = document.createElement("div");
div.className="row";

div.innerHTML = `
<input type="number" id="unit${courseCount}" placeholder="Unit">
<select id="grade${courseCount}">
<option value="5">A</option>
<option value="4">B</option>
<option value="3">C</option>
<option value="2">D</option>
<option value="1">E</option>
<option value="0">F</option>
</select>
`;

document.getElementById("cgpaBox").appendChild(div);
}

function calcCGPA(){

let total=0,units=0;

for(let i=1;i<=courseCount;i++){

let u = parseFloat(document.getElementById("unit"+i).value);
let g = parseFloat(document.getElementById("grade"+i).value);

if(!isNaN(u)){
total += u*g;
units += u;
}
}

if(units===0) return alert("Enter valid data");

let cgpa = (total/units).toFixed(2);

document.getElementById("result").innerHTML =
"🎓 CGPA: " + cgpa + " / 5.0";
}

</script>

</body>
  </html>
